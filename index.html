<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title></title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="">
</head>

<body>
    <label>Please input your favourite fruits</label>
    <input type="text" id="data" />
    <br>
    <button onclick="inputFruit()">Click to input your fruits</button>
    <div id="log"></div>
</body>
<script>
    var arr = [];

    function inputFruit() {
        var val = document.getElementById('data').value;
        arr.push(val)
        document.getElementById('log').innerHTML = arr;
        document.getElementById('data').value = '';
    }
</script>

</html>
